name: Publish Plugin

permissions: write-all

on:
  release:
    types:
      - released
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      MSBUILDDISABLENODEREUSE: '1'
      DOTNET_MULTILEVEL_LOOKUP: '0'
      GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Setup jprm
        run: pip install --user jprm

      - name: Build Jellyfin plugin
        id: jprm
        uses: oddstr13/jellyfin-plugin-repository-manager@4a2b165a3dc2cfc392db865a85f23c02e9f78c68
        with:
          dotnet-target: net9.0

      - name: Validate release version and artifact
        if: ${{ github.event_name == 'release' }}
        shell: bash
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          artifact_path="${{ steps.jprm.outputs.artifact }}"
          artifact_name="$(basename "$artifact_path")"

          build_version="$(python3 -c "import re, pathlib; t=pathlib.Path('build.yaml').read_text(encoding='utf-8'); m=re.search(r'^version:\\s*\\\"?([^\\\"]+)\\\"?', t, re.M); print(m.group(1) if m else '')")"
          manifest_version="$(python3 -c "import json, pathlib; d=json.loads(pathlib.Path('manifest.json').read_text(encoding='utf-8')); print(d[0]['versions'][0]['version'])")"
          expected_zip="mediatracker_${tag_version}.zip"

          echo "tag_version=$tag_version"
          echo "build_version=$build_version"
          echo "manifest_version=$manifest_version"
          echo "artifact_name=$artifact_name"

          [[ "$build_version" == "$tag_version" ]] || { echo "build.yaml version ($build_version) does not match tag ($tag_version)"; exit 1; }
          [[ "$manifest_version" == "$tag_version" ]] || { echo "manifest.json version ($manifest_version) does not match tag ($tag_version)"; exit 1; }
          [[ "$artifact_name" == "$expected_zip" ]] || { echo "artifact name ($artifact_name) does not match expected ($expected_zip)"; exit 1; }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          retention-days: 30
          if-no-files-found: error
          path: ${{ steps.jprm.outputs.artifact }}

      - name: Upload to release
        id: release
        if: ${{ github.event_name == 'release' }}
        uses: shogo82148/actions-upload-release-asset@b016af922a61601d647ff60226adadbe146b7651
        with:
          upload_url: ${{ github.event.release.upload_url }}
          overwrite: true
          asset_path: ${{ steps.jprm.outputs.artifact }}

      - name: Update manifest
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "release" ]]; then
            jprm repo add --plugin-url "${{ steps.release.outputs.browser_download_url }}" ./manifest.json "${{ steps.jprm.outputs.artifact }}"
          else
            jprm repo add ./manifest.json "${{ steps.jprm.outputs.artifact }}"
          fi

      - name: Normalize manifest sourceUrl to raw mirror
        if: ${{ github.event_name == 'release' }}
        shell: bash
        run: |
          set -euo pipefail
          version="$(python3 -c "import re, pathlib; t=pathlib.Path('build.yaml').read_text(encoding='utf-8'); m=re.search(r'^version:\\s*\\\"?([^\\\"]+)\\\"?', t, re.M); print(m.group(1) if m else '')")"
          repo="${{ github.repository }}"
          python3 - "$version" "$repo" <<'PY'
import json
import sys

version = sys.argv[1]
repo = sys.argv[2]
raw_url = f"https://raw.githubusercontent.com/{repo}/main/mediatracker/mediatracker_{version}.zip"

with open('manifest.json', 'r', encoding='utf-8') as f:
    data = json.load(f)

if data and data[0].get('versions'):
    data[0]['versions'][0]['sourceUrl'] = raw_url

with open('manifest.json', 'w', encoding='utf-8') as f:
    json.dump(data, f, indent=4)
    f.write('\n')

print(f"Updated top manifest sourceUrl to {raw_url}")
PY

      - name: Setup GPG keys for signed commits
        if: ${{ github.event_name == 'release' && env.GPG_PRIVATE_KEY != '' }}
        uses: crazy-max/ghaction-import-gpg@v4
        with:
          gpg_private_key: ${{ env.GPG_PRIVATE_KEY }}
          git_user_signingkey: true
          git_commit_gpgsign: true

      - name: Commit manifest
        if: ${{ github.event_name == 'release' }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ./manifest.json ./mediatracker/
          if git diff --cached --quiet; then
            echo "No manifest changes to commit"
            exit 0
          fi
          git commit -m "Update manifest.json"
          git push origin HEAD:main
